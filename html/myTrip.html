<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삿포로, 겨울의 기록</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/myTrip.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link" aria-label="홈으로 가기" title="홈으로">←</a>
    <header>
        <h1>✈️ 삿포로, 겨울의 기록</h1>
        <p>오타루 · 비에이 · 삿포로 — 눈으로 이어진 여정</p>

        <audio controls autoplay>
            <source src="../media/Ending.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </header>

    <hr>

    <main>
        <div class="trip-grid">
            <article class="trip-card">
                <h2>📍 오타루 운하</h2>
                <figure>
                    <img src="../media/오타루 운하.jpeg" alt="오타루 운하" width="300">
                    <figcaption>눈 내리는 오타루 운하의 겨울 풍경.</figcaption>
                </figure>
            </article>

            <article class="trip-card">
                <h2>📍 도카치다케 설산</h2>
                <figure>
                    <img src="../media/도카치다케 설산.jpeg" alt="도카치다케 설산" width="300">
                    <figcaption>비에이 거리 끝으로 보이는 눈 덮인 산.</figcaption>
                </figure>
            </article>

            <article class="trip-card">
                <h2>📍 탁신관 (拓真館)</h2>
                <figure>
                    <img src="../media/탁신관.jpeg" alt="탁신관" width="300">
                    <figcaption>눈 쌓인 숲길 끝에 자리한 사진 갤러리.</figcaption>
                </figure>
            </article>

            <article class="trip-card">
                <h2>📍 흰수염 폭포</h2>
                <figure>
                    <img src="../media/흰수염 폭포.jpeg" alt="흰수염 폭포" width="300">
                    <figcaption>겨울에도 얼지 않는 옥빛 폭포.</figcaption>
                </figure>
            </article>

            <article class="trip-card">
                <h2>📍 크리스마스 트리 나무</h2>
                <figure>
                    <img src="../media/크리스마스 트리 나무.jpeg" alt="크리스마스 트리 나무" width="300">
                    <figcaption>눈밭 위에 홀로 선 가문비나무.</figcaption>
                </figure>
            </article>

            <article class="trip-card">
                <h2>📍 니카상</h2>
                <figure>
                    <img src="../media/니카상.jpeg" alt="니카상" width="300">
                    <figcaption>니카상에서 만난 겨울 풍경.</figcaption>
                </figure>
            </article>
        </div>

        <hr>

        <article class="feature-card">
            <h2>📍 삿포로 눈축제 앨범</h2>
            <p>오도리 공원 일대에 대형 눈 조각상이 늘어서는 홋카이도 대표 겨울 축제.</p>
            <table>
                <caption>삿포로 눈축제 사진</caption>
                <tr>
                    <td><img src="../media/눈축제1.jpeg" alt="눈축제 사진 1" width="200" height="200"></td>
                    <td><img src="../media/눈축제2.jpeg" alt="눈축제 사진 2" width="200" height="200"></td>
                    <td><img src="../media/눈축제3.jpeg" alt="눈축제 사진 3" width="200" height="200"></td>
                </tr>
            </table>
        </article>

        <hr>

        <article class="feature-card">
            <h2>📍 오타루 아쿠아리움, 펭귄 산책</h2>
            <figure>
                <video controls width="300">
                    <source src="../media/오타루 아쿠아리움 펭귄.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <figcaption>아쿠아리움에서 만난 귀여운 펭귄들.</figcaption>
            </figure>
        </article>
    </main>

    <hr>

    <footer>
        <p>🏔️ 여행지: 오타루, 비에이, 삿포로</p>
    </footer>
    </div>
    <script src="../script/theme.js"></script>
</body>
</html>
