<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>나의 수업 일과</title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/myClass.css">
    </head>
    <body>
        <div class="container">
        <a href="index.html" class="back-link" aria-label="홈으로 가기" title="홈으로">←</a>
        <h1>🗓️ 나의 강의 시간표</h1>
        <div class="timetable-toolbar">
            <button type="button" class="game-btn" id="editTimetableBtn">✏️ 시간표 편집</button>
            <button type="button" class="game-reset" id="resetTimetableBtn">🔄 초기화</button>
        </div>
        <p class="game-msg" id="timetableMsg">편집 버튼을 누르면 칸을 클릭해서 과목을 추가·수정·삭제할 수 있어요.</p>
        <div class="table-scroll">
        <table id="timetableTable">
            <thead>
                <th>시간</th>
                <th>월요일</th>
                <th>화요일</th>
                <th>수요일</th>
                <th>목요일</th>
                <th>금요일</th>
            </thead>
            <tbody id="timetableBody"></tbody>
        </table>
        </div>

        <dialog id="classEditDialog" class="mini-dialog">
            <button type="button" class="game-close" id="closeClassEditBtn" aria-label="닫기">✕</button>
            <h4 id="classEditTitle">📚 과목 추가</h4>
            <p class="game-msg" id="classEditMsg"></p>
            <form id="classEditForm" class="grade-form">
                <label><span class="grade-label-text">요일</span>
                    <select id="classDaySelect" required></select>
                </label>
                <label><span class="grade-label-text">시작 시간</span>
                    <select id="classStartSelect" required></select>
                </label>
                <label><span class="grade-label-text">길이(시간)</span>
                    <select id="classSpanSelect" required></select>
                </label>
                <label><span class="grade-label-text">과목명</span>
                    <textarea id="classLabelInput" rows="2" maxlength="60" required placeholder="예: 자료구조&#10;(줄바꿈은 Enter로)"></textarea>
                </label>
                <button type="submit" class="grade-btn">저장</button>
            </form>
            <button type="button" class="game-reset" id="deleteClassBtn">🗑️ 이 과목 삭제</button>
        </dialog>
        </div>
    <script src="../script/theme.js"></script>
    <script src="../script/timetable.js"></script>
    </body>
</html>
